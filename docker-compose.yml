services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-capitalforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-capitalforge}
      POSTGRES_DB: ${POSTGRES_DB:-capitalforge}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
